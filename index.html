<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ContratoExpress</title>
  <p style="font-size:16px; margin-top:10px;">
⭐ Mais de 1.200 contratos já gerados
</p>
  <style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 0;
  }

  .container {
    background: white;
    padding: 30px;
    max-width: 700px;
    margin: 40px auto;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h1 {
    margin-bottom: 10px;
  }

  p {
    color: #555;
  }

  input, textarea, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ddd;
  }

  button {
    background: #667eea;
    color: white;
    padding: 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
  }

  button:hover {
    background: #5a67d8;
  }

  .result {
    text-align: left;
    margin-top: 20px;
    white-space: pre-wrap;
    background: #f9f9f9;
    padding: 20px;
    border-radius: 8px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Gere um contrato profissional pronto para uso em 2 minutos</h1>
  
  <p style="font-size:18px;">
⚡ Gere seu contrato profissional em menos de 2 minutos<br>
✔ Pronto para download em PDF<br>
✔ Ideal para freelancers e empresas
</p>

  <select id="tipo">
    <option>Prestação de Serviço</option>
    <option>Freelancer</option>
    <option>Autônomo</option>
  </select>

  <input id="contratante" placeholder="Nome do contratante">
  <input id="contratado" placeholder="Nome do contratado">
  <textarea id="descricao" placeholder="Descrição do serviço"></textarea>
  <input id="valor" placeholder="Valor do contrato">
  <input id="pagamento" placeholder="Forma de pagamento">
  <input id="prazo" placeholder="Prazo">
  <input id="cidade" placeholder="Cidade/Estado">
  <textarea id="clausulas" placeholder="Cláusulas adicionais (opcional)"></textarea>

  <button onclick="gerarContrato()">Gerar contrato</button>

  <div id="resultado" class="result"></div>

  <p style="margin-top:15px; font-weight:bold;">
📄 Baixe agora seu contrato formatado e pronto para uso profissional
</p>
  <button onclick="copiar()">Copiar contrato</button>
  <button onclick="pagar()">🔒 Baixar PDF Profissional - R$19,90</button>

</div>

<script>
function gerarContrato() {
  let tipo = document.getElementById("tipo").value;
  let contratante = document.getElementById("contratante").value;
  let contratado = document.getElementById("contratado").value;
  let descricao = document.getElementById("descricao").value;
  let valor = document.getElementById("valor").value;
  let pagamento = document.getElementById("pagamento").value;
  let prazo = document.getElementById("prazo").value;
  let cidade = document.getElementById("cidade").value;
  let clausulas = document.getElementById("clausulas").value;
  document.getElementById("resultado").innerText = "Gerando contrato...";

  let contrato = `
CONTRATO DE ${tipo.toUpperCase()}

CONTRATANTE: ${contratante}
CONTRATADO: ${contratado}

CLÁUSULA 1 – OBJETO
O presente contrato tem como objeto a prestação do seguinte serviço:
${descricao}

CLÁUSULA 2 – VALOR
O valor total do contrato é de ${valor}, a ser pago da seguinte forma:
${pagamento}

CLÁUSULA 3 – PRAZO
O serviço será prestado no prazo de ${prazo}.

CLÁUSULA 4 – RESCISÃO
O contrato poderá ser rescindido por qualquer das partes mediante aviso prévio.

CLÁUSULA 5 – FORO
Fica eleito o foro de ${cidade}.

CLÁUSULAS ADICIONAIS
${clausulas || "Nenhuma cláusula adicional."}

E por estarem de acordo, assinam:

_________________________
CONTRATANTE

_________________________
CONTRATADO
`;

  document.getElementById("resultado").innerText = contrato;
}

function copiar() {
  let texto = document.getElementById("resultado").innerText;
  navigator.clipboard.writeText(texto);
  alert("Contrato copiado!");
}

function pagar() {
  window.location.href = "https://mpago.la/2RKwymb";
}
</script>

</body>
</html>
